services:
  postgres:
    image: postgres:16-alpine
    container_name: psiko_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-psiko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psiko1234}
      POSTGRES_DB: ${POSTGRES_DB:-psikodb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psiko} -d ${POSTGRES_DB:-psikodb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: psiko_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-psiko}:${POSTGRES_PASSWORD:-psiko1234}@postgres:5432/${POSTGRES_DB:-psikodb}
      DIRECT_URL: postgresql://${POSTGRES_USER:-psiko}:${POSTGRES_PASSWORD:-psiko1234}@postgres:5432/${POSTGRES_DB:-psikodb}
    ports:
      - "4000:4000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
